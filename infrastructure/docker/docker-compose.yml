version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: consensus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consensus
    ports:
      - "5432:5432"
    volumes:
      - consensus_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: consensus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - consensus_redis_data:/data

volumes:
  consensus_pg_data:
  consensus_redis_data:
